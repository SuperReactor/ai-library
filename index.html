<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gateway</title>

  <style>
    body {
      margin: 0;
      font-family: "Google Sans", "Inter", sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0b0b12);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .title {
      font-size: 20px;
      background: linear-gradient(90deg,#4285F4,#EA4335,#FBBC05,#34A853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 680px;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg,#4285F4,#7baaf7);
    }

    .ai {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .inputbar {
      display: flex;
      padding: 16px;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.4);
    }

    input, select {
      padding: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
    }

    input { flex: 1; }

    button {
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg,#4285F4,#EA4335,#FBBC05,#34A853);
      color: white;
      cursor: pointer;
    }

    .thinking {
      position: relative;
      overflow: hidden;
    }

    .thinking::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body>

<header>
  <div class="title">AI Gateway</div>
</header>

<div class="chat" id="chat"></div>

<div class="inputbar">
  <select id="model">
    <option value="gemma">Gemma</option>
    <option value="qwen">Qwen</option>
    <option value="nemotron">Nemotron</option>
  </select>

  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const modelSelect = document.getElementById('model');

function addMessage(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  const model = modelSelect.value;

  addMessage(text, 'user');
  input.value = '';

  const loading = addMessage("Thinking...", 'ai thinking');

  try {
    const res = await fetch("/api", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: text, model })
    });

    const data = await res.json();
    const reply = data.response || data.result || JSON.stringify(data);

    loading.classList.remove("thinking");
    loading.textContent = reply;

  } catch (e) {
    loading.classList.remove("thinking");
    loading.textContent = "Error: " + e.message;
  }
}

input.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
